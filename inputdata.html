<h2 style="text-align:center;">Tambah Data Mahasiswa</h2>

<!-- FORM CARD -->
<div class="card form-card">

    <form action="proses_input.php" method="post" enctype="multipart/form-data">

        <label>Nama</label>
        <input type="text" name="nama" required>

        <label>NIM</label>
        <input type="text" name="nim" required>

        <label>Foto</label>
        <input type="file" name="foto" accept="image/*">

        <label>UTS</label>
        <input type="number" name="uts" min="0" max="100" required>

        <label>UAS</label>
        <input type="number" name="uas" min="0" max="100" required>

        <label>TUGAS</label>
        <input type="number" name="tugas" min="0" max="100" required>

        <button type="submit">Tambah Data</button>

    </form>

</div>

</body>
</html>
